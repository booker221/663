<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- ===== 设备检测 ===== -->
    
    <script>
      (function() {
        const device = window.innerWidth > 768 ? 'pc' : 'h5';
        const hash = window.location.hash;
        
        if (!hash || hash === '#/') {
          window.location.hash = '#/' + device;
        } else if (hash !== '#/' + device) {
          // 当前路径与设备不符时（例如预览分享链接），强制对齐
          window.location.hash = '#/' + device;
        }
      })();
    </script>

    <style>
      /* 基础性能样式：消除加载时的布局跳动 */
      :root { --primary: #D90D0D; --bg: #F4F7FF; }
      body { margin: 0; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
      #app { min-height: 100vh; }
      /* 预设 Banner 容器宽高比 */
      .hero-banner-wrap { aspect-ratio: 3840 / 1280; overflow: hidden; background: #eee; }
      @media (max-width: 768px) { .hero-banner-wrap { aspect-ratio: 750 / 420; } }
    </style>

    <!-- ===== 基础 SEO（首屏占位；有后端时由 src/stores/siteConfig.js 在加载配置后覆盖） ===== -->
    <title>企业官方落地页</title>
    <meta name="description" content="官方企业展示系统落地页，提供业务对接、商务洽谈等一站式服务。" />
    <meta name="keywords" content="落地页,企业系统,商务合作,资源对接" />
    <meta name="author" content="企业官方" />
    <meta name="robots" content="index, follow" />

    <!-- ===== Favicon ===== -->
    <link rel="icon" type="image/png" href="/src/assets/images/webp/logo-hx.webp" />
    <link rel="apple-touch-icon" href="/src/assets/images/webp/logo-hx.webp" />

    <!-- ===== Open Graph (Facebook / Telegram / 微信分享) ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="企业落地页" />
    <meta property="og:title" content="企业官方系统主页" />
    <meta property="og:description" content="官方企业展示系统落地页，提供全面的业务对接服务。" />
    <meta property="og:image" content="/src/assets/images/webp/logo-hx.webp" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="zh_CN" />

    <!-- ===== Twitter Card ===== -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="企业官方系统主页" />
    <meta name="twitter:description" content="官方企业展示系统落地页，提供全面的业务对接服务。" />
    <meta name="twitter:image" content="/src/assets/images/webp/logo-hx.webp" />

    <!-- ===== 结构化数据 (JSON-LD) ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "企业官方系统",
      "alternateName": "OfficialSite",
      "description": "官方企业展示系统落地页，提供业务对接服务。",
      "logo": "/src/assets/images/webp/logo-hx.webp"
    }
    </script>

    <!-- ===== 字体优化：预连接与精确字重 ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
